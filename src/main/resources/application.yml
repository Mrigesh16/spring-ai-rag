spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ragdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: update

  ai:
    ollama:
      base-url: http://localhost:11434

      chat:
        options:
          model: llama3.1:8b

      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      pgvector:
        initialize-schema: true